<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results Countdown</title>
  
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      position: relative;
    }

    /* Updated Title Styling */
    h1 {
      font-size: 2.5rem; /* Larger */
      font-weight: 800;   /* Bolder */
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 3rem;
      color: #FFD700;    /* Bright Gold */
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); /* Subtle glow */
    }

    .countdown-wrapper {
      display: flex;
      gap: 3rem;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .value {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 1rem;
      color: #555;
    }

    /* Updated Watermark Styling */
    .watermark {
      position: absolute;
      bottom: 3rem;
      font-size: 1.2rem; /* Larger */
      font-weight: 700;   /* Bolder */
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #FFD700;    /* Bright Gold */
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .countdown-wrapper { gap: 1.5rem; }
      .value { font-size: 2.5rem; }
      h1 { font-size: 1.5rem; letter-spacing: 3px; }
      .watermark { font-size: 0.8rem; bottom: 2rem; }
    }
  </style>
</head>
<body>

  <h1>Results Countdown</h1>

  <div class="countdown-wrapper">
    <div class="time-block">
      <div id="days" class="value">00</div>
      <div class="label">Days</div>
    </div>
    <div class="time-block">
      <div id="hours" class="value">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="time-block">
      <div id="minutes" class="value">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="time-block">
      <div id="seconds" class="value">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="watermark">Brought to you by Results Committee</div>

  <script>
    const targetDate = new Date("May 9, 2026 00:00:00").getTime();

    function updateTimer() {
      const now = new Date().getTime();
      const timeLeft = targetDate - now;

      if (timeLeft < 0) {
        document.querySelector(".countdown-wrapper").innerHTML = "<div class='value'>RESULTS ACHIEVED</div>";
        return;
      }

      const d = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
      const h = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((timeLeft % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = d.toString().padStart(2, '0');
      document.getElementById("hours").innerText = h.toString().padStart(2, '0');
      document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
      document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>

</body>
</html>
