<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results Countdown + Exam</title>
  
  <style>
    /* Reset and Base Layout */
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
      padding: 20px;
    }

    /* Background Date Grid */
    .bg-dates-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      z-index: -1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      opacity: 0.2;
      pointer-events: none;
    }

    .date-item {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #FFD700;
    }

    .date-item:nth-child(even) { text-align: right; }

    /* Layout Containers */
    .section-spacing { margin-bottom: 2.5rem; }

    /* Main Countdown */
    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 20px 30px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.1);
    }

    .time-block {
      display: flex;
      flex-direction: column;
      min-width: 60px;
    }

    .value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #FFD700;
      line-height: 1;
    }

    .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      margin-top: 8px;
    }

    /* Exam Button */
    .exam-button {
      display: inline-block;
      font-size: 1rem;
      font-weight: 800;
      color: #0a0a0a;
      background: #FFD700;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 6px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
    }

    .exam-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
      background: #fff;
    }

    /* Secondary Countdown */
    .subtitle {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #FFD700;
      margin-bottom: 1rem;
    }

    .secondary-wrapper {
      display: flex;
      justify-content: center;
      gap: 1rem;
      opacity: 0.8;
    }

    .secondary-wrapper .value { font-size: 1.2rem; }

    /* Contact & Footer */
    .contact-link {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 1px solid transparent;
      transition: 0.3s;
    }

    .contact-link:hover { color: #FFD700; border-color: #FFD700; }

    .results-img {
      margin-top: 2rem;
      max-width: 180px;
      filter: grayscale(1) brightness(1.5);
      opacity: 0.7;
    }

    /* Desktop View Adjustments */
    @media (min-width: 768px) {
      .bg-dates-container { grid-template-columns: repeat(4, 1fr); }
      .value { font-size: 4.5rem; }
      .secondary-wrapper .value { font-size: 2rem; }
      .countdown-wrapper { gap: 3rem; }
    }
  </style>
</head>
<body>

  <div class="bg-dates-container">
    <div class="date-item">May 9 2026</div>
    <div class="date-item">May 8 2027</div>
    <div class="date-item">May 13 2028</div>
    <div class="date-item">May 12 2029</div>
    </div>

  <div class="section-spacing">
    <div id="main-container" class="countdown-wrapper">
      <div class="time-block"><div id="days" class="value">00</div><div class="label">Days</div></div>
      <div class="time-block"><div id="hours" class="value">00</div><div class="label">Hours</div></div>
      <div class="time-block"><div id="minutes" class="value">00</div><div class="label">Minutes</div></div>
      <div class="time-block"><div id="seconds" class="value">00</div><div class="label">Seconds</div></div>
    </div>
  </div>

  <div class="section-spacing">
    <a href="https://forms.gle/d7xNWqN1j7u6mkBK6" target="_blank" class="exam-button">
      Take Exam (Due May 5)
    </a>
  </div>

  <div class="section-spacing">
    <div class="subtitle">Deadline Remaining:</div>
    <div id="secondary-container" class="secondary-wrapper">
      <div class="time-block"><div id="ex-days" class="value">00</div><div class="label">Days</div></div>
      <div class="time-block"><div id="ex-hours" class="value">00</div><div class="label">Hrs</div></div>
      <div class="time-block"><div id="ex-mins" class="value">00</div><div class="label">Min</div></div>
      <div class="time-block"><div id="ex-secs" class="value">00</div><div class="label">Sec</div></div>
    </div>
  </div>

  <div class="contact-container">
    <p class="label" style="margin-bottom: 5px;">Inquiries</p>
    <a href="mailto:resultscommitteeinfo@gmail.com" class="contact-link">resultscommitteeinfo@gmail.com</a>
  </div>

  <img src="RCLOGO_.png" alt="RC" class="results-img">

  <script>
    const resultsDate = new Date("May 9, 2026 20:00:00").getTime();
    const examDate = new Date("May 5, 2026 23:59:59").getTime();

    function updateTimer() {
      const now = new Date().getTime();

      const calculate = (target, ids) => {
        const diff = target - now;
        if (diff <= 0) {
          ids.forEach(id => document.getElementById(id).innerText = "00");
          return;
        }
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById(ids[0]).innerText = d.toString().padStart(2, '0');
        document.getElementById(ids[1]).innerText = h.toString().padStart(2, '0');
        document.getElementById(ids[2]).innerText = m.toString().padStart(2, '0');
        document.getElementById(ids[3]).innerText = s.toString().padStart(2, '0');
      };

      calculate(resultsDate, ["days", "hours", "minutes", "seconds"]);
      calculate(examDate, ["ex-days", "ex-hours", "ex-mins", "ex-secs"]);
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
</body>
</html>
